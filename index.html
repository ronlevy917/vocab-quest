  <script>
(() => {
'use strict';
const $ = (sel, root=document) => root.querySelector(sel);
const $$ = (sel, root=document) => Array.from(root.querySelectorAll(sel));
const DATA = JSON.parse(document.getElementById('vocab-data').textContent);
const BASE_VOCAB = DATA.vocab;
const TOPICS = DATA.topics;
const LEVELS = DATA.levels;
const STORAGE_KEY = 'vocabQuestLifePro.v2.progress';
const SETTINGS_KEY = 'vocabQuestLifePro.v2.settings';
const CUSTOM_KEY = 'vocabQuestLifePro.v2.customWords';
let CUSTOM_WORDS = loadCustomWords();
let VOCAB = buildVocab();

const state = {mode:'cards',level:'all',topic:'all',search:'',current:null,currentOptions:[],locked:false,reverseCard:false,matchSelected:null,matchPairs:[],test:null,progress:loadProgress(),settings:loadSettings(),voices:[],editingCustomId:null};
const els = {app:$('#app'),screen:$('#screen'),subtitle:$('#subtitle'),progressText:$('#progressText'),modeTitle:$('#modeTitle'),toast:$('#toast'),nav:$('#bottomNav'),topicChips:$('#topicChips'),levelChips:$('#levelChips'),searchInput:$('#searchInput'),smartBtn:$('#smartBtn'),resetBtn:$('#resetBtn'),exportBtn:$('#exportBtn'),importInput:$('#importInput'),voiceSelect:$('#voiceSelect'),statsPanel:$('#statsPanel'),exportWordsBtn:$('#exportWordsBtn'),importWordsInput:$('#importWordsInput'),clearWordsBtn:$('#clearWordsBtn')};

function loadProgress(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}')}catch{return{}}}
function saveProgress(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(state.progress))}catch(e){console.warn(e)}renderStats()}
function loadSettings(){try{return JSON.parse(localStorage.getItem(SETTINGS_KEY)||'{}')}catch{return{}}}
function saveSettings(){try{localStorage.setItem(SETTINGS_KEY,JSON.stringify(state.settings))}catch(e){console.warn(e)}}
function loadCustomWords(){try{const x=JSON.parse(localStorage.getItem(CUSTOM_KEY)||'[]');return Array.isArray(x)?x:[]}catch{return[]}}
function saveCustomWords(){try{localStorage.setItem(CUSTOM_KEY,JSON.stringify(CUSTOM_WORDS))}catch(e){console.warn(e)}VOCAB=buildVocab()}
function buildVocab(){return [...BASE_VOCAB.map(normalizeItem), ...CUSTOM_WORDS.map(normalizeItem)]}
function normalizeItem(item){
  const x = {...item};
  x.synonyms = arr(x.synonyms); x.heAlso = arr(x.heAlso); x.aliases = arr(x.aliases);
  x.topicLabel = TOPICS[x.topic] || x.topicLabel || x.topic || '';
  x.levelLabel = LEVELS[x.level] || x.levelLabel || x.level || '';
  x.id = x.id || ('custom-' + Math.random().toString(36).slice(2));
  x.word = String(x.word||'').trim(); x.he = String(x.he||'').trim();
  x.display = x.display || '';
  x.sentence = x.sentence || makeSentence(x);
  x.hint = x.hint || makeHint(x);
  return x;
}
function arr(v){if(!v)return[];if(Array.isArray(v))return v.map(String).map(s=>s.trim()).filter(Boolean);return splitList(v)}
function splitList(s){return String(s||'').split(/[\/;,،]+/).map(x=>x.trim()).filter(Boolean)}
function makeSentence(x){return `The team discussed ${x.word} during the review.`}
function makeHint(x){return `${TOPICS[x.topic]||x.topic||'כללי'} • ${LEVELS[x.level]||x.level||''} • מתחיל ב־${(x.word||'?').slice(0,1).toUpperCase()} • תרגום: ${x.he||''}`}
function progressFor(id){if(!state.progress[id])state.progress[id]={seen:0,correct:0,wrong:0,streak:0,hard:false,due:0,last:0};return state.progress[id]}
function mark(item,isCorrect){const p=progressFor(item.id);p.seen++;p.last=Date.now();if(isCorrect){p.correct++;p.streak++;if(p.streak>=3)p.hard=false;const day=86400000;const interval=p.streak===1?1:p.streak===2?3:p.streak===3?7:Math.min(30,7+p.streak*4);p.due=Date.now()+interval*day}else{p.wrong++;p.streak=0;p.hard=true;p.due=Date.now()}saveProgress()}
function setHard(item,hard=true){const p=progressFor(item.id);p.hard=hard;p.due=Date.now();saveProgress();toast(hard?'סומן כמילה קשה':'הוסר מהמילים הקשות')}
function toast(msg){els.toast.textContent=msg;els.toast.classList.add('show');clearTimeout(toast._t);toast._t=setTimeout(()=>els.toast.classList.remove('show'),1600)}
function shuffle(arr){const a=arr.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function clean(s){return String(s||'').toLowerCase().replace(/[’']/g,"'").replace(/[^a-z0-9\s-]/g,'').replace(/\s+/g,' ').trim()}
function esc(str){return String(str??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function englishDisplay(item){return item.display || [item.word,...arr(item.synonyms)].filter(Boolean).join(' / ')}
function heDisplay(item){return [item.he,...arr(item.heAlso)].filter(Boolean).join(' / ')}
function acceptedEnglish(item){return [item.word,...arr(item.synonyms),...arr(item.aliases), item.display].filter(Boolean).map(clean).filter(Boolean)}
function answerInfo(item){
  const syn = arr(item.synonyms); const heAlso = arr(item.heAlso); const aliases = arr(item.aliases);
  return `<div class="answerInfo">
    <div class="line"><b>${esc(englishDisplay(item))}</b> — ${esc(heDisplay(item))}</div>
    ${syn.length?`<div class="line">מילים נרדפות באנגלית: <b>${esc(syn.join(' / '))}</b></div>`:''}
    ${aliases.length?`<div class="line">קיצורים/תשובות מתקבלות: <b>${esc(aliases.join(' / '))}</b></div>`:''}
    ${heAlso.length?`<div class="line">עברית נוספת: ${esc(heAlso.join(' / '))}</div>`:''}
    ${item.sentence?`<div class="line" dir="ltr">${esc(item.sentence)}</div>`:''}
  </div>`;
}
function filtered({ignoreSearch=false,smart=false}={}){let list=VOCAB.filter(x=>(state.level==='all'||x.level===state.level)&&(state.topic==='all'||x.topic===state.topic));const q=state.search.trim().toLowerCase();if(q&&!ignoreSearch){list=list.filter(x=>[x.word,englishDisplay(x),heDisplay(x),x.topicLabel,x.levelLabel,x.group,...arr(x.synonyms),...arr(x.aliases)].join(' ').toLowerCase().includes(q)||heDisplay(x).includes(state.search))}if(smart||state.settings.smart){const now=Date.now();const special=list.filter(x=>{const p=progressFor(x.id);return p.hard||p.wrong>p.correct||(p.due&&p.due<=now)||p.seen===0});if(special.length>=5)list=special}return list}
function weight(item){const p=progressFor(item.id);let w=1;if(p.seen===0)w+=4;if(p.hard)w+=8;if(p.wrong>p.correct)w+=5;if(p.due&&p.due<=Date.now())w+=3;w+=Math.max(0,p.wrong-p.correct)*2;return w+Math.random()}
function pickItem(){const list=filtered();if(!list.length)return null;return list.map(x=>[x,weight(x)]).sort((a,b)=>b[1]-a[1])[0][0]}
function distractorsFor(item,count=3){const groups=[VOCAB.filter(x=>x.id!==item.id&&x.group&&x.group===item.group),VOCAB.filter(x=>x.id!==item.id&&x.topic===item.topic&&x.level===item.level),VOCAB.filter(x=>x.id!==item.id&&x.topic===item.topic),VOCAB.filter(x=>x.id!==item.id&&x.level===item.level),VOCAB.filter(x=>x.id!==item.id)];let pool=[];groups.forEach(g=>shuffle(g).forEach(x=>{if(!pool.some(p=>p.id===x.id))pool.push(x)}));return pool.slice(0,count)}
function makeOptions(item,count=4){return shuffle([item,...distractorsFor(item,count-1)]).slice(0,count)}
function blankSentence(sentence,item){let s=String(sentence||'');const words=[item.word,...arr(item.synonyms),...arr(item.aliases)].filter(Boolean).sort((a,b)=>b.length-a.length);for(const word of words){const escWord=word.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');const re=new RegExp('\\b'+escWord+'\\b','i');if(re.test(s))return esc(s).replace(re,'<span class="blank">_____</span>')}return esc(s).replace(esc(item.word),'<span class="blank">_____</span>')}
function speak(text,kind='word'){if(!('speechSynthesis'in window)){toast('הדפדפן לא תומך בהשמעה');return}window.speechSynthesis.cancel();const utter=new SpeechSynthesisUtterance(text);utter.lang='en-US';utter.rate=kind==='sentence'?0.88:0.82;utter.pitch=1;const selected=state.settings.voiceURI;const voice=state.voices.find(v=>v.voiceURI===selected)||state.voices.find(v=>/^en[-_]/i.test(v.lang))||null;if(voice)utter.voice=voice;window.speechSynthesis.speak(utter)}
function initVoices(){if(!('speechSynthesis'in window))return;const load=()=>{state.voices=window.speechSynthesis.getVoices().filter(v=>/^en[-_]/i.test(v.lang));if(els.voiceSelect){els.voiceSelect.innerHTML='<option value="">קול ברירת מחדל באנגלית</option>'+state.voices.map(v=>`<option value="${esc(v.voiceURI)}" ${state.settings.voiceURI===v.voiceURI?'selected':''}>${esc(v.name)} (${esc(v.lang)})</option>`).join('')}};load();window.speechSynthesis.onvoiceschanged=load}
function chip(value,label,active,kind){return `<button class="chip ${active?'active':''}" data-${kind}="${esc(value)}">${esc(label)}</button>`}
function renderFilters(){els.levelChips.innerHTML=chip('all','כל הרמות',state.level==='all','level')+Object.entries(LEVELS).map(([k,v])=>chip(k,v,state.level===k,'level')).join('');els.topicChips.innerHTML=chip('all','כל הנושאים',state.topic==='all','topic')+Object.entries(TOPICS).map(([k,v])=>chip(k,v,state.topic===k,'topic')).join('');els.smartBtn.classList.toggle('active',!!state.settings.smart)}
function itemBadge(item){return `<div class="badges"><span>${esc(item.levelLabel)}</span><span>${esc(item.topicLabel)}</span><span>${esc(item.pos||'term')}</span>${item.custom?'<span class="customBadge">אישי</span>':''}</div>`}
function progressBadge(item){const p=progressFor(item.id);const accuracy=p.seen?Math.round(p.correct/p.seen*100):0;return `<div class="mini-stats"><span>נצפה: ${p.seen}</span><span>נכון: ${p.correct}</span><span>טעויות: ${p.wrong}</span><span>דיוק: ${accuracy}%</span>${p.hard?'<span class="hardTag">קשה</span>':''}</div>`}
function progressSummary(){const active=filtered({ignoreSearch:true});let seen=0,mastered=0,hard=0;active.forEach(x=>{const p=progressFor(x.id);if(p.seen)seen++;if(p.correct>=3&&p.correct>=p.wrong*2)mastered++;if(p.hard)hard++});return `נלמדו ${seen}/${active.length} • שולטים ${mastered} • קשות ${hard} • אישיות ${CUSTOM_WORDS.length}`}

function render(){renderFilters();const list=filtered();const total=list.length;const all=filtered({ignoreSearch:true});els.subtitle.textContent=`${total} מילים פעילות מתוך ${VOCAB.length} • ${state.level==='all'?'כל הרמות':LEVELS[state.level]} • ${state.topic==='all'?'כל הנושאים':TOPICS[state.topic]}`;els.progressText.textContent=progressSummary();$$('.navBtn',els.nav).forEach(b=>b.classList.toggle('active',b.dataset.mode===state.mode));const titles={cards:'כרטיסיות חכמות',choice:'בחירה מרובה',sentence:'השלמת משפטים',listening:'שמיעה בלבד',typing:'הקלדה ואיות',matching:'התאמה',test:'מבחן אמיתי',list:'רשימת מילים',custom:'הוספת מילים אישיות'};els.modeTitle.textContent=titles[state.mode]||'Vocab Quest';if(state.mode==='custom'){renderCustom();renderStats();return}if(!all.length){els.screen.innerHTML=emptyState('אין מילים במסנן הנוכחי');return}if(state.mode==='cards')renderCards();if(state.mode==='choice')renderChoice();if(state.mode==='sentence')renderSentence();if(state.mode==='listening')renderListening();if(state.mode==='typing')renderTyping();if(state.mode==='matching')renderMatching();if(state.mode==='test')renderTest();if(state.mode==='list')renderList();renderStats()}

function renderTyping(){const item=pickItem();state.current=item;state.locked=false;if(!item){els.screen.innerHTML=emptyState('אין מילים לתרגול');return}els.screen.innerHTML=`<section class="card question">${itemBadge(item)}<span class="questionLabel">כתוב באנגלית</span><h2 class="hePrompt">${esc(heDisplay(item))}</h2><input class="typeInput" id="typeAnswer" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" placeholder="הקלד כאן באנגלית..."><div class="actions"><button class="primary" data-action="checkType">בדוק</button><button data-speak-word="${esc(item.word)}">🔊 שמע מילה</button><button data-speak-sentence="${esc(item.sentence)}">🔊 שמע משפט</button><button data-action="showHint">💡 רמז</button></div><div class="hintBox hidden" id="hintBox">${esc(item.hint)}</div><div class="feedback" id="feedback"></div></section>`;setTimeout(()=>$('#typeAnswer')?.focus(),100)}
function renderMatching(){const list=shuffle(filtered()).slice(0,6);if(list.length<4){els.screen.innerHTML=emptyState('צריך לפחות 4 מילים במסנן כדי לשחק התאמה');return}state.matchPairs=list;state.matchSelected=null;const cards=shuffle([...list.map(x=>({kind:'word',id:x.id,text:englishDisplay(x)})),...list.map(x=>({kind:'he',id:x.id,text:heDisplay(x)}))]);els.screen.innerHTML=`<section class="card question"><span class="questionLabel">התאם אנגלית לעברית</span><div class="matchGrid">${cards.map((c,i)=>`<button class="matchCard" data-match-id="${esc(c.id)}" data-kind="${c.kind}" data-index="${i}">${esc(c.text)}</button>`).join('')}</div><div class="feedback" id="feedback">מצא 6 זוגות.</div></section>`}
function startTest(){const pool=shuffle(filtered({smart:false}));const size=Math.min(30,Math.max(10,pool.length));state.test={i:0,size,score:0,mistakes:[],qs:pool.slice(0,size).map(item=>({item,kind:shuffle(['choice','sentence','listen','typing'])[0]}))}}
function renderTest(){if(!state.test)startTest();const t=state.test;if(t.i>=t.size)return renderTestSummary();const q=t.qs[t.i];state.current=q.item;state.locked=false;if(q.kind==='typing'){els.screen.innerHTML=`<section class="card question"><div class="testProgress"><span>שאלה ${t.i+1}/${t.size}</span><span>ציון: ${t.score}</span></div>${itemBadge(q.item)}<span class="questionLabel">מבחן: כתוב באנגלית</span><h2 class="hePrompt">${esc(heDisplay(q.item))}</h2><input class="typeInput" id="typeAnswer" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false"><div class="actions"><button class="primary" data-test-type="typing">בדוק</button><button data-action="showHint">💡 רמז</button></div><div class="hintBox hidden" id="hintBox">${esc(q.item.hint)}</div><div class="feedback" id="feedback"></div></section>`;return}const options=makeOptions(q.item,4);state.currentOptions=options;const isSentence=q.kind==='sentence';const isListen=q.kind==='listen';els.screen.innerHTML=`<section class="card question"><div class="testProgress"><span>שאלה ${t.i+1}/${t.size}</span><span>ציון: ${t.score}</span></div>${itemBadge(q.item)}<span class="questionLabel">מבחן: ${isSentence?'השלמת משפט':isListen?'שמיעה':'בחירת תרגום'}</span>${isSentence?`<p class="sentencePrompt">${blankSentence(q.item.sentence,q.item)}</p>`:isListen?`<div class="listenIcon">🎧</div><div class="actions center"><button class="primary bigBtn" data-speak-word="${esc(q.item.word)}">🔊 השמע</button><button data-action="showWord">👁️ הצג מילה</button></div><div class="revealedWord hidden" id="revealedWord">${esc(englishDisplay(q.item))}</div>`:`<h2 class="bigPrompt">${esc(englishDisplay(q.item))}</h2>`}<div class="hintBox hidden" id="hintBox">${esc(q.item.hint)}</div><div class="actions"><button data-action="showHint">💡 רמז</button></div><div class="optionGrid">${options.map(o=>`<button class="option" data-test-answer="${esc(o.id)}">${esc(isSentence?englishDisplay(o):heDisplay(o))}</button>`).join('')}</div><div class="feedback" id="feedback"></div></section>`;if(isListen)setTimeout(()=>speak(q.item.word),250)}
function renderTestSummary(){const t=state.test;const pct=Math.round(t.score/t.size*100);els.screen.innerHTML=`<section class="card resultCard"><div class="trophy">🏆</div><h2>סיימת מבחן</h2><div class="scoreCircle">${pct}%</div><p>ענית נכון על ${t.score} מתוך ${t.size} שאלות.</p><div class="actions center"><button class="primary" data-action="newTest">מבחן חדש</button><button data-mode="list" class="secondary navInline">פתח רשימה</button></div>${t.mistakes.length?`<h3>מילים לחזרה</h3><div class="mistakeList">${t.mistakes.map(m=>`<div><b>${esc(englishDisplay(m))}</b> — ${esc(heDisplay(m))}</div>`).join('')}</div>`:'<p class="successText">לא היו טעויות. מצוין.</p>'}</section>`}
function renderList(){const list=filtered().sort((a,b)=>a.topicLabel.localeCompare(b.topicLabel,'he')||a.levelLabel.localeCompare(b.levelLabel,'he')||englishDisplay(a).localeCompare(englishDisplay(b)));els.screen.innerHTML=`<section class="card listCard"><div class="listHeader"><h2>רשימת מילים</h2><span>${list.length} פריטים</span></div><div class="vocabList">${list.map(item=>{const p=progressFor(item.id);const acc=p.seen?Math.round(p.correct/p.seen*100):0;return `<div class="rowItem"><div><b>${esc(englishDisplay(item))}</b><span>${esc(heDisplay(item))}</span><small>${esc(item.topicLabel)} • ${esc(item.levelLabel)} • דיוק ${acc}%${item.custom?' • אישי':''}</small>${arr(item.synonyms).length||arr(item.heAlso).length||arr(item.aliases).length?`<small>נרדפות/נוספות: ${esc([...arr(item.synonyms),...arr(item.aliases),...arr(item.heAlso)].join(' / '))}</small>`:''}</div><div class="rowBtns"><button class="round" data-speak-word="${esc(item.word)}">🔊</button><button class="round" data-list-hard="${esc(item.id)}">⭐</button>${item.custom?`<button class="round" data-edit-custom="${esc(item.id)}">✏️</button><button class="round danger" data-delete-custom="${esc(item.id)}">🗑️</button>`:''}</div></div>`}).join('')}</div></section>`}
function renderCustom(){const editing=state.editingCustomId?CUSTOM_WORDS.find(x=>x.id===state.editingCustomId):null;els.screen.innerHTML=`<section class="card"><h2>${editing?'עריכת מילה אישית':'הוסף מילה חדשה'}</h2><p class="muted">אפשר להוסיף מילים נרדפות באנגלית ומשמעויות נוספות בעברית עם פסיק או /.</p><div class="wordForm"><div class="field"><label>מילה ראשית באנגלית *</label><input id="cwWord" dir="ltr" value="${esc(editing?.word||'')}"></div><div class="field"><label>מילים נרדפות באנגלית</label><input id="cwSyn" dir="ltr" placeholder="obstinate / stubborn" value="${esc(arr(editing?.synonyms).join(' / '))}"></div><div class="field"><label>תרגום ראשי לעברית *</label><input id="cwHe" value="${esc(editing?.he||'')}"></div><div class="field"><label>עברית נוספת</label><input id="cwHeAlso" placeholder="עיקש / נוקשה" value="${esc(arr(editing?.heAlso).join(' / '))}"></div><div class="field"><label>נושא</label><select id="cwTopic">${Object.entries(TOPICS).map(([k,v])=>`<option value="${esc(k)}" ${editing?.topic===k?'selected':''}>${esc(v)}</option>`).join('')}</select></div><div class="field"><label>רמה</label><select id="cwLevel">${Object.entries(LEVELS).map(([k,v])=>`<option value="${esc(k)}" ${editing?.level===k?'selected':''}>${esc(v)}</option>`).join('')}</select></div><div class="field full"><label>משפט לדוגמה באנגלית</label><textarea id="cwSentence" dir="ltr" placeholder="The insurer reviewed the claim.">${esc(editing?.sentence||'')}</textarea></div><div class="field full"><label>רמז</label><textarea id="cwHint" placeholder="לא חובה — אם תשאיר ריק המשחק ייצור רמז אוטומטי">${esc(editing?.hint||'')}</textarea></div></div><div class="customTools"><button class="primary" data-action="saveCustomWord">${editing?'שמור שינויים':'➕ הוסף מילה'}</button>${editing?'<button data-action="cancelEditCustom">בטל עריכה</button>':''}<button data-action="exportCustomWords">⬇️ ייצוא מילים אישיות</button><button onclick="document.getElementById('importWordsInput').click()" type="button">⬆️ ייבוא מילים אישיות</button><button class="danger" data-action="clearCustomWords">🗑️ מחק מילים אישיות</button><input id="importWordsInput" type="file" accept="application/json" class="hidden"></div><div class="customNotice">מילים אישיות נשמרות רק במכשיר הזה. כדי להעביר למחשב/אייפון אחר השתמש בייצוא וייבוא.</div><h3>המילים האישיות שלך (${CUSTOM_WORDS.length})</h3><div class="vocabList">${CUSTOM_WORDS.length?CUSTOM_WORDS.map(x=>{x=normalizeItem(x);return `<div class="rowItem"><div><b>${esc(englishDisplay(x))}</b><span>${esc(heDisplay(x))}</span><small>${esc(x.topicLabel)} • ${esc(x.levelLabel)}</small></div><div class="rowBtns"><button data-edit-custom="${esc(x.id)}">✏️</button><button class="danger" data-delete-custom="${esc(x.id)}">🗑️</button></div></div>`}).join(''):'<p class="muted">עדיין לא נוספו מילים אישיות.</p>'}</div></section>`}
function handleAnswer(answerId,isTest=false){if(state.locked)return;state.locked=true;const item=state.current;const ok=answerId===item.id;mark(item,ok);$$('.option').forEach(btn=>{const id=btn.dataset.answer||btn.dataset.testAnswer;btn.disabled=true;if(id===item.id)btn.classList.add('correct');else if(id===answerId)btn.classList.add('wrong')});const fb=$('#feedback');if(fb)fb.innerHTML=(ok?`✅ נכון!`:`❌ לא נכון.`)+answerInfo(item);if(isTest){if(ok)state.test.score++;else state.test.mistakes.push(item);setTimeout(()=>{state.test.i++;renderTest()},1700)}else{setTimeout(()=>render(),1900)}}
function handleTyping(isTest=false){if(state.locked)return;const input=$('#typeAnswer');const item=state.current;const user=clean(input?.value||'');const ok=acceptedEnglish(item).includes(user);state.locked=true;mark(item,ok);const fb=$('#feedback');if(fb)fb.innerHTML=(ok?'✅ מצוין.':'❌ לא נכון.')+answerInfo(item);if(isTest){if(ok)state.test.score++;else state.test.mistakes.push(item);setTimeout(()=>{state.test.i++;renderTest()},1700)}else{setTimeout(()=>render(),1900)}}
function handleMatch(btn){if(btn.classList.contains('matched'))return;if(!state.matchSelected){state.matchSelected=btn;btn.classList.add('selected');return}const first=state.matchSelected;if(first===btn){first.classList.remove('selected');state.matchSelected=null;return}const ok=first.dataset.matchId===btn.dataset.matchId&&first.dataset.kind!==btn.dataset.kind;if(ok){first.classList.add('matched');btn.classList.add('matched');first.classList.remove('selected');btn.classList.remove('selected');const item=VOCAB.find(x=>x.id===btn.dataset.matchId);if(item)mark(item,true);const remaining=$$('.matchCard:not(.matched)').length;$('#feedback').textContent=remaining?`יפה. נשארו ${remaining/2} זוגות.`:'סיימת את משחק ההתאמה!';if(!remaining)setTimeout(renderMatching,1300)}else{first.classList.add('wrong');btn.classList.add('wrong');const item=VOCAB.find(x=>x.id===btn.dataset.matchId);if(item)mark(item,false);setTimeout(()=>{first.classList.remove('selected','wrong');btn.classList.remove('wrong')},650)}state.matchSelected=null}
function renderStats(){if(!els.statsPanel)return;const active=filtered({ignoreSearch:true});const byTopic={};active.forEach(item=>{const key=item.topicLabel;byTopic[key]||={total:0,seen:0,hard:0,correct:0,wrong:0};const p=progressFor(item.id);byTopic[key].total++;if(p.seen)byTopic[key].seen++;if(p.hard)byTopic[key].hard++;byTopic[key].correct+=p.correct;byTopic[key].wrong+=p.wrong});els.statsPanel.innerHTML=Object.entries(byTopic).slice(0,12).map(([name,s])=>{const pct=s.total?Math.round(s.seen/s.total*100):0;return `<div class="statLine"><span>${esc(name)}</span><b>${pct}%</b><small>${s.seen}/${s.total} נלמדו • ${s.hard} קשות</small></div>`}).join('')}
function downloadJson(filename,obj){const blob=new Blob([JSON.stringify(obj,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=filename;a.click();URL.revokeObjectURL(a.href)}
function exportProgress(){downloadJson('vocab-quest-progress.json',{version:2,exportedAt:new Date().toISOString(),progress:state.progress,settings:state.settings})}
function importProgress(file){if(!file)return;const reader=new FileReader();reader.onload=()=>{try{const data=JSON.parse(reader.result);if(!data.progress)throw new Error('missing progress');state.progress=data.progress;if(data.settings)state.settings=data.settings;saveProgress();saveSettings();render();toast('ההתקדמות יובאה בהצלחה')}catch(e){toast('קובץ התקדמות לא תקין')}};reader.readAsText(file)}
function saveCustomFromForm(){const word=$('#cwWord')?.value.trim();const he=$('#cwHe')?.value.trim();if(!word||!he){toast('צריך מילה באנגלית ותרגום בעברית');return}const topic=$('#cwTopic').value;const level=$('#cwLevel').value;const item={id:state.editingCustomId||('custom-'+Date.now().toString(36)+'-'+Math.random().toString(36).slice(2,7)),custom:true,word,he,topic,topicLabel:TOPICS[topic],level,levelLabel:LEVELS[level],pos:'custom',group:'custom-'+topic,synonyms:splitList($('#cwSyn')?.value||''),heAlso:splitList($('#cwHeAlso')?.value||''),aliases:[],sentence:$('#cwSentence')?.value.trim(),hint:$('#cwHint')?.value.trim()};item.sentence=item.sentence||makeSentence(item);item.hint=item.hint||makeHint(item);if(state.editingCustomId){const idx=CUSTOM_WORDS.findIndex(x=>x.id===state.editingCustomId);if(idx>=0)CUSTOM_WORDS[idx]=item}else{CUSTOM_WORDS.push(item)}state.editingCustomId=null;saveCustomWords();toast('המילה נשמרה');render()}
function exportCustomWords(){downloadJson('vocab-quest-my-words.json',{version:2,exportedAt:new Date().toISOString(),customWords:CUSTOM_WORDS})}
function importCustomWords(file){if(!file)return;const reader=new FileReader();reader.onload=()=>{try{const data=JSON.parse(reader.result);const arrIn=Array.isArray(data)?data:data.customWords;if(!Array.isArray(arrIn))throw new Error('missing customWords');let added=0;arrIn.forEach(raw=>{const item=normalizeItem({...raw,custom:true,id:raw.id||('custom-'+Date.now().toString(36)+'-'+Math.random().toString(36).slice(2,7))});if(!CUSTOM_WORDS.some(x=>x.id===item.id)){CUSTOM_WORDS.push(item);added++}});saveCustomWords();render();toast(`יובאו ${added} מילים אישיות`)}catch(e){toast('קובץ מילים אישיות לא תקין')}};reader.readAsText(file)}
function deleteCustom(id){if(!confirm('למחוק את המילה האישית?'))return;CUSTOM_WORDS=CUSTOM_WORDS.filter(x=>x.id!==id);delete state.progress[id];saveCustomWords();saveProgress();render()}
function clearCustom(){if(!CUSTOM_WORDS.length){toast('אין מילים אישיות למחיקה');return}if(confirm('למחוק את כל המילים האישיות? ההתקדמות שלהן תימחק גם.')){CUSTOM_WORDS.forEach(x=>delete state.progress[x.id]);CUSTOM_WORDS=[];saveCustomWords();saveProgress();render();toast('המילים האישיות נמחקו')}}
function bindEvents(){document.addEventListener('click',e=>{const btn=e.target.closest('button');if(!btn)return;if(btn.dataset.level){state.level=btn.dataset.level;state.current=null;state.test=null;render();return}if(btn.dataset.topic){state.topic=btn.dataset.topic;state.current=null;state.test=null;render();return}if(btn.dataset.mode){state.mode=btn.dataset.mode;state.current=null;state.test=null;render();return}if(btn.dataset.known){mark(state.current,btn.dataset.known==='1');state.current=null;state.reverseCard=false;render();return}if(btn.dataset.speakWord){speak(btn.dataset.speakWord,'word');return}if(btn.dataset.speakSentence){speak(btn.dataset.speakSentence,'sentence');return}if(btn.dataset.answer){handleAnswer(btn.dataset.answer,false);return}if(btn.dataset.testAnswer){handleAnswer(btn.dataset.testAnswer,true);return}if(btn.dataset.testType==='typing'){handleTyping(true);return}if(btn.dataset.listHard){const item=VOCAB.find(x=>x.id===btn.dataset.listHard);if(item)setHard(item,!progressFor(item.id).hard);renderList();return}if(btn.dataset.editCustom){state.mode='custom';state.editingCustomId=btn.dataset.editCustom;render();return}if(btn.dataset.deleteCustom){deleteCustom(btn.dataset.deleteCustom);return}if(btn.classList.contains('matchCard')){handleMatch(btn);return}const action=btn.dataset.action;if(action==='flip'){state.reverseCard=!state.reverseCard;renderCards()}if(action==='next'){state.current=null;state.reverseCard=false;render()}if(action==='hard'){setHard(state.current,true)}if(action==='showHint'){$('#hintBox')?.classList.remove('hidden')}if(action==='showTranslation'){toast(heDisplay(state.current))}if(action==='showWord'){$('#revealedWord')?.classList.remove('hidden')}if(action==='checkType'){handleTyping(false)}if(action==='newTest'){state.test=null;renderTest()}if(action==='saveCustomWord'){saveCustomFromForm()}if(action==='cancelEditCustom'){state.editingCustomId=null;render()}if(action==='exportCustomWords'){exportCustomWords()}if(action==='clearCustomWords'){clearCustom()}});document.addEventListener('change',e=>{if(e.target&&e.target.id==='importWordsInput')importCustomWords(e.target.files[0])});document.addEventListener('keydown',e=>{if(e.key==='Enter'&&state.mode==='typing')handleTyping(false);if(e.key==='Enter'&&state.mode==='test'&&$('#typeAnswer'))handleTyping(true);if(e.key===' '&&state.current&&state.mode==='cards'){e.preventDefault();state.reverseCard=!state.reverseCard;renderCards()}});els.searchInput.addEventListener('input',e=>{state.search=e.target.value;state.current=null;render()});els.smartBtn.addEventListener('click',()=>{state.settings.smart=!state.settings.smart;saveSettings();render()});els.resetBtn.addEventListener('click',()=>{if(confirm('לאפס את כל ההתקדמות במכשיר הזה? המילים האישיות לא יימחקו.')){state.progress={};saveProgress();render();toast('ההתקדמות אופסה')}});els.exportBtn.addEventListener('click',exportProgress);els.importInput.addEventListener('change',e=>importProgress(e.target.files[0]));els.voiceSelect?.addEventListener('change',e=>{state.settings.voiceURI=e.target.value;saveSettings()})}
function boot(){initVoices();bindEvents();render()}
boot();
})();
</script>
