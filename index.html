  <div class="app" id="app">
    <header class="topbar">
      <div class="brand">
        <div class="logo">🎯</div>

      </div>

        <div id="screen"></div>

        <label>קול באנגלית</label>
        <select id="voiceSelect" class="voiceSelect"><option>טוען קולות...</option></select>
        <div class="settingsBtns">

          <button id="resetBtn" class="danger">🗑️ איפוס כל ההתקדמות</button>

        <p class="muted">ההתקדמות נשמרת במכשיר. לניוד בין מחשב לאייפון השתמש בייצוא/ייבוא.</p>
        <h3>מצב נוכחי</h3>
        <div id="statsPanel"></div>
      </aside>
    </main>
  </div>

    <button class="navBtn" data-mode="sentence"><span class="ico">✍️</span><span>משפט</span></button>

    <button class="navBtn" data-mode="typing"><span class="ico">⌨️</span><span>הקלדה</span></button>

    <button class="navBtn" data-mode="list"><span class="ico">📚</span><span>רשימה</span></button>

    topic: 'all',
    search: '',
    current: null,
    currentOptions: [],
    locked: false,
    reverseCard: false,
    matchSelected: null,
    matchPairs: [],
    test: null,
    progress: loadProgress(),
    settings: loadSettings(),
    voices: []
  };

  const els = {
    app: $('#app'),
    screen: $('#screen'),
    subtitle: $('#subtitle'),
    progressText: $('#progressText'),
    modeTitle: $('#modeTitle'),
    toast: $('#toast'),
    nav: $('#bottomNav'),
    topicChips: $('#topicChips'),
    levelChips: $('#levelChips'),
    searchInput: $('#searchInput'),
    smartBtn: $('#smartBtn'),
    resetBtn: $('#resetBtn'),
    exportBtn: $('#exportBtn'),
    importInput: $('#importInput'),
    voiceSelect: $('#voiceSelect'),
    statsPanel: $('#statsPanel')
  };

  function loadProgress(){
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); }
    catch { return {}; }
  }
  function saveProgress(){
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state.progress)); }
    catch(e) { console.warn('Progress could not be saved locally:', e); }
    renderStats();
  }
  function loadSettings(){
    try { return JSON.parse(localStorage.getItem(SETTINGS_KEY) || '{}'); }
    catch { return {}; }
  }
  function saveSettings(){ try { localStorage.setItem(SETTINGS_KEY, JSON.stringify(state.settings)); } catch(e) { console.warn('Settings could not be saved locally:', e); } }
  function progressFor(id){
    if(!state.progress[id]) state.progress[id] = {seen:0, correct:0, wrong:0, streak:0, hard:false, due:0, last:0};
    return state.progress[id];
  }
  function mark(item, isCorrect){
    const p = progressFor(item.id);
    p.seen += 1;
    p.last = Date.now();
    if(isCorrect){
      p.correct += 1;
      p.streak += 1;
      if(p.streak >= 3) p.hard = false;
      const day = 24*60*60*1000;
      const interval = p.streak === 1 ? 1 : p.streak === 2 ? 3 : p.streak === 3 ? 7 : Math.min(30, 7 + p.streak * 4);
      p.due = Date.now() + interval * day;
    } else {
      p.wrong += 1;
      p.streak = 0;
      p.hard = true;
      p.due = Date.now();
    }
    saveProgress();
  }
  function setHard(item, hard=true){
    const p = progressFor(item.id); p.hard = hard; p.due = Date.now(); saveProgress();
    toast(hard ? 'סומן כמילה קשה' : 'הוסר מהמילים הקשות');
  }

  function toast(msg){
    els.toast.textContent = msg;
    els.toast.classList.add('show');
    clearTimeout(toast._t);
    toast._t = setTimeout(() => els.toast.classList.remove('show'), 1600);
  }

  function shuffle(arr){
    const a = arr.slice();
    for(let i=a.length-1;i>0;i--){ const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
    return a;
  }
  function clean(s){ return String(s||'').toLowerCase().replace(/[’']/g,"'").replace(/[^a-z0-9\s-]/g,'').replace(/\s+/g,' ').trim(); }
  function normalizeHeb(s){ return String(s||'').replace(/\s+/g,' ').trim(); }

  function filtered({ignoreSearch=false, smart=false}={}){
    let list = VOCAB.filter(x => (state.level === 'all' || x.level === state.level) && (state.topic === 'all' || x.topic === state.topic));
    const q = state.search.trim().toLowerCase();
    if(q && !ignoreSearch){
      list = list.filter(x => x.word.toLowerCase().includes(q) || x.he.includes(state.search) || x.topicLabel.includes(state.search) || x.levelLabel.includes(state.search));
    }
    if(smart || state.settings.smart){
      const now = Date.now();
      const special = list.filter(x => {
        const p = progressFor(x.id);
        return p.hard || p.wrong > p.correct || (p.due && p.due <= now) || p.seen === 0;
      });
      if(special.length >= 5) list = special;
    }
    return list;
  }

  function weight(item){
    const p = progressFor(item.id);
    let w = 1;
    if(p.seen === 0) w += 4;
    if(p.hard) w += 8;
    if(p.wrong > p.correct) w += 5;
    if(p.due && p.due <= Date.now()) w += 3;
    w += Math.max(0, p.wrong - p.correct) * 2;
    return w + Math.random();
  }
  function pickItem(){
    const list = filtered();
    if(!list.length) return null;
    return list.map(x => [x, weight(x)]).sort((a,b)=>b[1]-a[1])[0][0];
  }
  function distractorsFor(item, count=3){
    const sameGroup = VOCAB.filter(x => x.id !== item.id && x.group && x.group === item.group);
    const sameTopicLevel = VOCAB.filter(x => x.id !== item.id && x.topic === item.topic && x.level === item.level);
    const sameTopic = VOCAB.filter(x => x.id !== item.id && x.topic === item.topic);
    const sameLevel = VOCAB.filter(x => x.id !== item.id && x.level === item.level);
    let pool = [];
    [sameGroup, sameTopicLevel, sameTopic, sameLevel, VOCAB.filter(x=>x.id!==item.id)].forEach(group => {
      shuffle(group).forEach(x => { if(!pool.some(p=>p.id===x.id)) pool.push(x); });
    });
    return pool.slice(0,count);
  }
  function makeOptions(item, count=4){
    return shuffle([item, ...distractorsFor(item, count-1)]).slice(0,count);
  }
  function blankSentence(sentence, word){
    const esc = word.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const re = new RegExp('\\b' + esc + '\\b', 'i');
    const blank = '<span class="blank">_____</span>';
    if(re.test(sentence)) return sentence.replace(re, blank);
    return sentence.replace(word, blank);
  }

  function speak(text, kind='word'){
    if(!('speechSynthesis' in window)) { toast('הדפדפן לא תומך בהשמעה'); return; }
    window.speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = 'en-US';
    utter.rate = kind === 'sentence' ? 0.88 : 0.82;
    utter.pitch = 1;
    const selected = state.settings.voiceURI;
    const voice = state.voices.find(v => v.voiceURI === selected) || state.voices.find(v => /^en[-_]/i.test(v.lang)) || null;
    if(voice) utter.voice = voice;
    window.speechSynthesis.speak(utter);
  }

  function initVoices(){
    if(!('speechSynthesis' in window)) return;
    const load = () => {
      state.voices = window.speechSynthesis.getVoices().filter(v => /^en[-_]/i.test(v.lang));
      if(els.voiceSelect){
        els.voiceSelect.innerHTML = '<option value="">קול ברירת מחדל באנגלית</option>' + state.voices.map(v => `<option value="${escapeAttr(v.voiceURI)}" ${state.settings.voiceURI===v.voiceURI?'selected':''}>${escapeHtml(v.name)} (${escapeHtml(v.lang)})</option>`).join('');
      }
    };
    load();
    window.speechSynthesis.onvoiceschanged = load;
  }

  function escapeHtml(str){ return String(str).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
  function escapeAttr(str){ return escapeHtml(str); }

  function chip(value, label, active, kind){
    return `<button class="chip ${active?'active':''}" data-${kind}="${escapeAttr(value)}">${escapeHtml(label)}</button>`;
  }
  function renderFilters(){
    els.levelChips.innerHTML = chip('all','כל הרמות',state.level==='all','level') + Object.entries(LEVELS).map(([k,v])=>chip(k,v,state.level===k,'level')).join('');
    els.topicChips.innerHTML = chip('all','כל הנושאים',state.topic==='all','topic') + Object.entries(TOPICS).map(([k,v])=>chip(k,v,state.topic===k,'topic')).join('');
    els.smartBtn.classList.toggle('active', !!state.settings.smart);
  }

  function itemBadge(item){
    return `<div class="badges"><span>${escapeHtml(item.levelLabel)}</span><span>${escapeHtml(item.topicLabel)}</span><span>${escapeHtml(item.pos)}</span></div>`;
  }
  function progressBadge(item){
    const p = progressFor(item.id);
    const accuracy = p.seen ? Math.round(p.correct / p.seen * 100) : 0;
    return `<div class="mini-stats"><span>נצפה: ${p.seen}</span><span>נכון: ${p.correct}</span><span>טעויות: ${p.wrong}</span><span>דיוק: ${accuracy}%</span>${p.hard?'<span class="hardTag">קשה</span>':''}</div>`;
  }

  function render(){
    renderFilters();
    const list = filtered();
    const total = list.length;
    const all = filtered({ignoreSearch:true});
    els.subtitle.textContent = `${total} מילים פעילות מתוך ${VOCAB.length} • ${state.level==='all'?'כל הרמות':LEVELS[state.level]} • ${state.topic==='all'?'כל הנושאים':TOPICS[state.topic]}`;
    els.progressText.textContent = progressSummary();
    $$('.navBtn', els.nav).forEach(b => b.classList.toggle('active', b.dataset.mode === state.mode));
    const titles = {cards:'כרטיסיות חכמות', choice:'בחירה מרובה', sentence:'השלמת משפטים', listening:'שמיעה בלבד', typing:'הקלדה ואיות', matching:'התאמה', test:'מבחן אמיתי', list:'רשימת מילים'};
    els.modeTitle.textContent = titles[state.mode] || 'Vocab Quest';
    if(!all.length){ els.screen.innerHTML = emptyState('אין מילים במסנן הנוכחי'); return; }
    if(state.mode === 'cards') renderCards();
    if(state.mode === 'choice') renderChoice(false);
    if(state.mode === 'sentence') renderSentence();
    if(state.mode === 'listening') renderListening();
    if(state.mode === 'typing') renderTyping();
    if(state.mode === 'matching') renderMatching();
    if(state.mode === 'test') renderTest();
    if(state.mode === 'list') renderList();
    renderStats();
  }

  function progressSummary(){
    const active = filtered({ignoreSearch:true});
    let seen=0, mastered=0, hard=0;
    active.forEach(x=>{ const p=progressFor(x.id); if(p.seen) seen++; if(p.correct>=3 && p.correct>=p.wrong*2) mastered++; if(p.hard) hard++; });
    return `נלמדו ${seen}/${active.length} • שולטים ${mastered} • קשות ${hard}`;
  }

  function emptyState(msg){
    return `<div class="card"><h2>${escapeHtml(msg)}</h2><p>נסה לשנות רמה, נושא או חיפוש.</p></div>`;
  }

  function renderCards(){
    const item = state.current && filtered().some(x=>x.id===state.current.id) ? state.current : pickItem();
    state.current = item;
    if(!item){ els.screen.innerHTML = emptyState('אין מילים לתרגול'); return; }
    const front = !state.reverseCard;
    els.screen.innerHTML = `
      <section class="study-card flip ${front?'':'reversed'}">
        ${itemBadge(item)}
        <div class="wordBlock">
          <div class="word">${escapeHtml(front ? item.word : item.he)}</div>
          <button class="round" data-speak-word="${escapeAttr(item.word)}" title="השמע מילה">🔊</button>
        </div>
        <div class="translation">${escapeHtml(front ? item.he : item.word)}</div>
        <div class="sentence">${escapeHtml(item.sentence)}</div>
        <div class="actions">
          <button class="primary" data-action="flip">הפוך כרטיס</button>
          <button data-speak-sentence="${escapeAttr(item.sentence)}">🔊 שמע משפט</button>
          <button data-action="hard">⭐ קשה</button>
        </div>
        <div class="answerActions">
          <button class="success" data-known="1">ידעתי</button>
          <button class="danger" data-known="0">לא ידעתי</button>
          <button data-action="next">הבא</button>
        </div>
        ${progressBadge(item)}
      </section>`;
  }

  function renderChoice(reverse=false){
    const item = pickItem();
    state.current = item; state.locked = false;
    if(!item){ els.screen.innerHTML = emptyState('אין מילים לתרגול'); return; }
    const options = makeOptions(item, 4);
    state.currentOptions = options;
    els.screen.innerHTML = `
      <section class="card question">
        ${itemBadge(item)}
        <div class="questionTop"><span class="questionLabel">בחר את התרגום הנכון</span><button class="round" data-speak-word="${escapeAttr(item.word)}">🔊</button></div>
        <h2 class="bigPrompt">${escapeHtml(item.word)}</h2>
        <div class="optionGrid">${options.map(o=>`<button class="option" data-answer="${escapeAttr(o.id)}">${escapeHtml(o.he)}</button>`).join('')}</div>
        <div class="feedback" id="feedback"></div>
      </section>`;
  }

  function renderSentence(){
    const item = pickItem();
    state.current = item; state.locked = false;
    if(!item){ els.screen.innerHTML = emptyState('אין מילים לתרגול'); return; }
    const options = makeOptions(item, 4);
    state.currentOptions = options;
    els.screen.innerHTML = `
      <section class="card question">
        ${itemBadge(item)}
        <div class="questionTop"><span class="questionLabel">השלם את המילה החסרה</span><button class="round" data-speak-sentence="${escapeAttr(item.sentence)}">🔊 משפט מלא</button></div>
        <p class="sentencePrompt">${blankSentence(escapeHtml(item.sentence), escapeHtml(item.word))}</p>
        <div class="hintBox hidden" id="hintBox">${escapeHtml(item.hint)}</div>
        <div class="actions"><button data-action="showHint">💡 חשוף רמז</button><button data-action="showTranslation">🇮🇱 הצג תרגום</button></div>
        <div class="optionGrid">${options.map(o=>`<button class="option" data-answer="${escapeAttr(o.id)}">${escapeHtml(o.word)}</button>`).join('')}</div>
        <div class="feedback" id="feedback"></div>
      </section>`;
  }

  function renderListening(){
    const item = pickItem();
    state.current = item; state.locked = false;
    if(!item){ els.screen.innerHTML = emptyState('אין מילים לתרגול'); return; }
    const options = makeOptions(item, 4);
    state.currentOptions = options;
    els.screen.innerHTML = `
      <section class="card question listeningCard">
        ${itemBadge(item)}
        <div class="listenIcon">🎧</div>
        <h2>שמע את המילה ובחר את התרגום</h2>
        <p class="muted">בהתחלה לא רואים את המילה. אפשר לחשוף אותה בלחיצה.</p>
        <div class="actions center"><button class="primary bigBtn" data-speak-word="${escapeAttr(item.word)}">🔊 השמע מילה</button><button data-action="showWord">👁️ הצג מילה</button><button data-action="showHint">💡 רמז</button></div>
        <div class="revealedWord hidden" id="revealedWord">${escapeHtml(item.word)}</div>
        <div class="hintBox hidden" id="hintBox">${escapeHtml(item.hint)}</div>
        <div class="optionGrid">${options.map(o=>`<button class="option" data-answer="${escapeAttr(o.id)}">${escapeHtml(o.he)}</button>`).join('')}</div>
        <div class="feedback" id="feedback"></div>
      </section>`;
    setTimeout(()=>speak(item.word), 250);
  }

  function renderTyping(){
    const item = pickItem();
    state.current = item; state.locked = false;
    if(!item){ els.screen.innerHTML = emptyState('אין מילים לתרגול'); return; }
    els.screen.innerHTML = `
      <section class="card question">
        ${itemBadge(item)}
        <span class="questionLabel">כתוב באנגלית</span>
        <h2 class="hePrompt">${escapeHtml(item.he)}</h2>
        <input class="typeInput" id="typeAnswer" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" placeholder="הקלד כאן באנגלית...">
        <div class="actions"><button class="primary" data-action="checkType">בדוק</button><button data-speak-word="${escapeAttr(item.word)}">🔊 שמע</button><button data-action="showHint">💡 רמז</button></div>
        <div class="hintBox hidden" id="hintBox">${escapeHtml(item.hint)}</div>
        <div class="feedback" id="feedback"></div>
      </section>`;
    setTimeout(()=>$('#typeAnswer')?.focus(), 100);
  }

  function renderMatching(){
    const list = shuffle(filtered()).slice(0,6);
    if(list.length < 4){ els.screen.innerHTML = emptyState('צריך לפחות 4 מילים במסנן כדי לשחק התאמה'); return; }
    state.matchPairs = list;
    state.matchSelected = null;
    const cards = shuffle([...list.map(x=>({kind:'word', id:x.id, text:x.word})), ...list.map(x=>({kind:'he', id:x.id, text:x.he}))]);
    els.screen.innerHTML = `
      <section class="card question">
        <span class="questionLabel">התאם אנגלית לעברית</span>
        <div class="matchGrid">${cards.map((c,i)=>`<button class="matchCard" data-match-id="${escapeAttr(c.id)}" data-kind="${c.kind}" data-index="${i}">${escapeHtml(c.text)}</button>`).join('')}</div>
        <div class="feedback" id="feedback">מצא 6 זוגות. מילים דומות נשארות באותו נושא ורמה.</div>
      </section>`;
  }

  function startTest(){
    const pool = shuffle(filtered({smart:false}));
    const size = Math.min(30, Math.max(10, pool.length));
    state.test = {i:0, size, score:0, mistakes:[], qs: pool.slice(0,size).map(item => ({item, kind: shuffle(['choice','sentence','listen','typing'])[0]}))};
  }
  function renderTest(){
    if(!state.test) startTest();
    const t = state.test;
    if(t.i >= t.size){ return renderTestSummary(); }
    const q = t.qs[t.i];
    state.current = q.item; state.locked = false;
    if(q.kind === 'typing'){
      els.screen.innerHTML = `
        <section class="card question">
          <div class="testProgress"><span>שאלה ${t.i+1}/${t.size}</span><span>ציון: ${t.score}</span></div>
          ${itemBadge(q.item)}
          <span class="questionLabel">מבחן: כתוב באנגלית</span>
          <h2 class="hePrompt">${escapeHtml(q.item.he)}</h2>
          <input class="typeInput" id="typeAnswer" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false">
          <div class="actions"><button class="primary" data-test-type="typing">בדוק</button><button data-action="showHint">💡 רמז</button></div>
          <div class="hintBox hidden" id="hintBox">${escapeHtml(q.item.hint)}</div><div class="feedback" id="feedback"></div>
        </section>`;
      return;
    }
    const options = makeOptions(q.item,4);
    state.currentOptions = options;
    const isSentence = q.kind === 'sentence';
    const isListen = q.kind === 'listen';
    els.screen.innerHTML = `
      <section class="card question">
        <div class="testProgress"><span>שאלה ${t.i+1}/${t.size}</span><span>ציון: ${t.score}</span></div>
        ${itemBadge(q.item)}
        <span class="questionLabel">מבחן: ${isSentence?'השלמת משפט':isListen?'שמיעה':'בחירת תרגום'}</span>
        ${isSentence ? `<p class="sentencePrompt">${blankSentence(escapeHtml(q.item.sentence), escapeHtml(q.item.word))}</p>` : isListen ? `<div class="listenIcon">🎧</div><div class="actions center"><button class="primary bigBtn" data-speak-word="${escapeAttr(q.item.word)}">🔊 השמע</button><button data-action="showWord">👁️ הצג מילה</button></div><div class="revealedWord hidden" id="revealedWord">${escapeHtml(q.item.word)}</div>` : `<h2 class="bigPrompt">${escapeHtml(q.item.word)}</h2>`}
        <div class="hintBox hidden" id="hintBox">${escapeHtml(q.item.hint)}</div>
        <div class="actions"><button data-action="showHint">💡 רמז</button></div>
        <div class="optionGrid">${options.map(o=>`<button class="option" data-test-answer="${escapeAttr(o.id)}">${escapeHtml(isSentence ? o.word : o.he)}</button>`).join('')}</div>
        <div class="feedback" id="feedback"></div>
      </section>`;
    if(isListen) setTimeout(()=>speak(q.item.word), 250);
  }
  function renderTestSummary(){
    const t = state.test;
    const pct = Math.round(t.score / t.size * 100);
    els.screen.innerHTML = `
      <section class="card resultCard">
        <div class="trophy">🏆</div>
        <h2>סיימת מבחן</h2>
        <div class="scoreCircle">${pct}%</div>
        <p>ענית נכון על ${t.score} מתוך ${t.size} שאלות.</p>
        <div class="actions center"><button class="primary" data-action="newTest">מבחן חדש</button><button data-mode="list" class="secondary navInline">פתח רשימה</button></div>
        ${t.mistakes.length ? `<h3>מילים לחזרה</h3><div class="mistakeList">${t.mistakes.map(m=>`<div><b>${escapeHtml(m.word)}</b> — ${escapeHtml(m.he)}</div>`).join('')}</div>` : '<p class="successText">לא היו טעויות. מצוין.</p>'}
      </section>`;
  }

  function renderList(){
    const list = filtered().sort((a,b)=>a.topicLabel.localeCompare(b.topicLabel,'he') || a.levelLabel.localeCompare(b.levelLabel,'he') || a.word.localeCompare(b.word));
    els.screen.innerHTML = `
      <section class="card listCard">
        <div class="listHeader"><h2>רשימת מילים</h2><span>${list.length} פריטים</span></div>
        <div class="vocabList">${list.map(item => {
          const p = progressFor(item.id); const acc = p.seen ? Math.round(p.correct/p.seen*100) : 0;
          return `<div class="rowItem">
            <div><b>${escapeHtml(item.word)}</b><span>${escapeHtml(item.he)}</span><small>${escapeHtml(item.topicLabel)} • ${escapeHtml(item.levelLabel)} • דיוק ${acc}%</small></div>
            <div class="rowBtns"><button class="round" data-speak-word="${escapeAttr(item.word)}">🔊</button><button class="round" data-list-hard="${escapeAttr(item.id)}">⭐</button></div>
          </div>`;
        }).join('')}</div>
      </section>`;
  }

  function handleAnswer(answerId, isTest=false){
    if(state.locked) return;
    state.locked = true;
    const item = state.current;
    const ok = answerId === item.id;
    mark(item, ok);
    $$('.option').forEach(btn => {
      const id = btn.dataset.answer || btn.dataset.testAnswer;
      btn.disabled = true;
      if(id === item.id) btn.classList.add('correct');
      else if(id === answerId) btn.classList.add('wrong');
    });
    const fb = $('#feedback');
    if(fb) fb.innerHTML = ok ? `✅ נכון! <b>${escapeHtml(item.word)}</b> = ${escapeHtml(item.he)}` : `❌ לא נכון. התשובה: <b>${escapeHtml(item.word)}</b> — ${escapeHtml(item.he)}`;
    if(isTest){
      if(ok) state.test.score += 1; else state.test.mistakes.push(item);
      setTimeout(()=>{ state.test.i += 1; renderTest(); }, 950);
    } else {
      setTimeout(()=>render(), 1100);
    }
  }

  function handleTyping(isTest=false){
    if(state.locked) return;
    const input = $('#typeAnswer');
    const item = state.current;
    const user = clean(input?.value || '');
    const target = clean(item.word);
    const ok = user === target;
    state.locked = true;
    mark(item, ok);
    const fb = $('#feedback');
    if(fb) fb.innerHTML = ok ? `✅ מצוין. ${escapeHtml(item.word)}` : `❌ התשובה הנכונה: <b>${escapeHtml(item.word)}</b><br><span>${escapeHtml(item.sentence)}</span>`;
    if(isTest){
      if(ok) state.test.score += 1; else state.test.mistakes.push(item);
      setTimeout(()=>{ state.test.i += 1; renderTest(); }, 1200);
    } else {
      setTimeout(()=>render(), 1300);
    }
  }

  function handleMatch(btn){
    if(btn.classList.contains('matched')) return;
    if(!state.matchSelected){ state.matchSelected = btn; btn.classList.add('selected'); return; }
    const first = state.matchSelected;
    if(first === btn){ first.classList.remove('selected'); state.matchSelected = null; return; }
    const ok = first.dataset.matchId === btn.dataset.matchId && first.dataset.kind !== btn.dataset.kind;
    if(ok){
      first.classList.add('matched'); btn.classList.add('matched');
      first.classList.remove('selected'); btn.classList.remove('selected');
      const item = VOCAB.find(x=>x.id===btn.dataset.matchId); if(item) mark(item,true);
      const remaining = $$('.matchCard:not(.matched)').length;
      $('#feedback').textContent = remaining ? `יפה. נשארו ${remaining/2} זוגות.` : 'סיימת את משחק ההתאמה!';
      if(!remaining) setTimeout(renderMatching, 1300);
    } else {
      first.classList.add('wrong'); btn.classList.add('wrong');
      const item = VOCAB.find(x=>x.id===btn.dataset.matchId); if(item) mark(item,false);
      setTimeout(()=>{ first.classList.remove('selected','wrong'); btn.classList.remove('wrong'); }, 650);
    }
    state.matchSelected = null;
  }

  function renderStats(){
    if(!els.statsPanel) return;
    const active = filtered({ignoreSearch:true});
    const byTopic = {};
    active.forEach(item => {
      const key = item.topicLabel;
      byTopic[key] ||= {total:0, seen:0, hard:0, correct:0, wrong:0};
      const p = progressFor(item.id);
      byTopic[key].total++; if(p.seen) byTopic[key].seen++; if(p.hard) byTopic[key].hard++; byTopic[key].correct += p.correct; byTopic[key].wrong += p.wrong;
    });
    els.statsPanel.innerHTML = Object.entries(byTopic).slice(0,12).map(([name,s])=>{
      const pct = s.total ? Math.round(s.seen/s.total*100) : 0;
      return `<div class="statLine"><span>${escapeHtml(name)}</span><b>${pct}%</b><small>${s.seen}/${s.total} נלמדו • ${s.hard} קשות</small></div>`;
    }).join('');
  }

  function exportProgress(){
    const blob = new Blob([JSON.stringify({version:1, exportedAt:new Date().toISOString(), progress:state.progress, settings:state.settings}, null, 2)], {type:'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'vocab-quest-progress.json';
    a.click();
    URL.revokeObjectURL(a.href);
  }
  function importProgress(file){
    if(!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const data = JSON.parse(reader.result);
        if(!data.progress) throw new Error('missing progress');
        state.progress = data.progress;
        if(data.settings) state.settings = data.settings;
        saveProgress(); saveSettings(); render(); toast('ההתקדמות יובאה בהצלחה');
      } catch(e){ toast('קובץ התקדמות לא תקין'); }
    };
    reader.readAsText(file);
  }

  function bindEvents(){
    document.addEventListener('click', (e) => {
      const btn = e.target.closest('button'); if(!btn) return;
      if(btn.dataset.level){ state.level = btn.dataset.level; state.current = null; state.test = null; render(); return; }
      if(btn.dataset.topic){ state.topic = btn.dataset.topic; state.current = null; state.test = null; render(); return; }
      if(btn.dataset.mode){ state.mode = btn.dataset.mode; state.current = null; state.test = null; render(); return; }
      if(btn.dataset.known){ mark(state.current, btn.dataset.known === '1'); state.current = null; state.reverseCard = false; render(); return; }
      if(btn.dataset.speakWord){ speak(btn.dataset.speakWord, 'word'); return; }
      if(btn.dataset.speakSentence){ speak(btn.dataset.speakSentence, 'sentence'); return; }
      if(btn.dataset.answer){ handleAnswer(btn.dataset.answer, false); return; }
      if(btn.dataset.testAnswer){ handleAnswer(btn.dataset.testAnswer, true); return; }
      if(btn.dataset.testType === 'typing'){ handleTyping(true); return; }
      if(btn.dataset.listHard){ const item = VOCAB.find(x=>x.id===btn.dataset.listHard); if(item) setHard(item, !progressFor(item.id).hard); renderList(); return; }
      if(btn.classList.contains('matchCard')){ handleMatch(btn); return; }
      const action = btn.dataset.action;
      if(action === 'flip'){ state.reverseCard = !state.reverseCard; renderCards(); }
      if(action === 'next'){ state.current = null; state.reverseCard = false; render(); }
      if(action === 'hard'){ setHard(state.current,true); }
      if(action === 'showHint'){ $('#hintBox')?.classList.remove('hidden'); }
      if(action === 'showTranslation'){ toast(state.current.he); }
      if(action === 'showWord'){ $('#revealedWord')?.classList.remove('hidden'); }
      if(action === 'checkType'){ handleTyping(false); }
      if(action === 'newTest'){ state.test = null; renderTest(); }
    });
    document.addEventListener('keydown', (e) => {
      if(e.key === 'Enter' && state.mode === 'typing') handleTyping(false);
      if(e.key === 'Enter' && state.mode === 'test' && $('#typeAnswer')) handleTyping(true);
      if(e.key === ' ' && state.current && state.mode === 'cards'){ e.preventDefault(); state.reverseCard = !state.reverseCard; renderCards(); }
    });
    els.searchInput.addEventListener('input', e => { state.search = e.target.value; state.current = null; render(); });
    els.smartBtn.addEventListener('click', () => { state.settings.smart = !state.settings.smart; saveSettings(); render(); });
    els.resetBtn.addEventListener('click', () => {
      if(confirm('לאפס את כל ההתקדמות במכשיר הזה?')){ state.progress = {}; saveProgress(); render(); toast('ההתקדמות אופסה'); }
    });
    els.exportBtn.addEventListener('click', exportProgress);
    els.importInput.addEventListener('change', e => importProgress(e.target.files[0]));
    els.voiceSelect?.addEventListener('change', e => { state.settings.voiceURI = e.target.value; saveSettings(); });
  }

  function boot(){
    initVoices(); bindEvents(); render();
  }
  boot();
})();
</script>
</body>
</html>
